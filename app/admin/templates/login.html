<!DOCTYPE html>
<html lang="uk" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BLACK ROOM — Вхід</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        body {
            background: #0a0e14; min-height: 100vh;
            display: flex; align-items: center; justify-content: center;
            background-image: radial-gradient(ellipse at 50% 0%, rgba(88,166,255,0.06) 0%, transparent 60%);
        }
        .login-card {
            background: #111820; border: 1px solid #1e2a3a; border-radius: 16px;
            padding: 2.5rem; width: 100%; max-width: 400px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.4);
        }
        .login-logo {
            text-align: center; font-size: 1.6rem; font-weight: 800;
            color: #f0f6fc; margin-bottom: 0.5rem; letter-spacing: -0.5px;
        }
        .login-logo span { color: #58a6ff; }
        .login-sub { text-align: center; font-size: 0.8rem; color: #484f58; margin-bottom: 2rem; }
        .form-control {
            background: #0a0e14; border-color: #1e2a3a; color: #e6edf3;
            border-radius: 10px; padding: 0.65rem 0.9rem;
        }
        .form-control:focus {
            background: #0a0e14; border-color: #58a6ff; color: #e6edf3;
            box-shadow: 0 0 0 0.2rem rgba(88,166,255,0.15);
        }
        .form-label { color: #8b949e; font-size: 0.8rem; font-weight: 600; }
        .btn-login {
            background: #238636; border-color: #238636; width: 100%; padding: 0.7rem;
            font-weight: 700; border-radius: 10px; font-size: 0.9rem;
            transition: all 0.2s;
        }
        .btn-login:hover { background: #2ea043; transform: translateY(-1px); box-shadow: 0 4px 12px rgba(35,134,54,0.3); }
        .alert-danger { background: rgba(248,81,73,0.1); border-color: #f85149; color: #f85149; border-radius: 10px; }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="login-logo">⚫ BLACK <span>ROOM</span></div>
        <div class="login-sub">Admin Panel</div>
        {% if error %}
        <div class="alert alert-danger py-2 mb-3" style="font-size: 0.85rem;">
            <i class="bi bi-exclamation-triangle"></i> {{ error }}
        </div>
        {% endif %}
        <form method="POST" action="/admin/login">
            <div class="mb-3">
                <label class="form-label">Логін</label>
                <input type="text" name="username" class="form-control" required autocomplete="username" autofocus placeholder="admin">
            </div>
            <div class="mb-3">
                <label class="form-label">Пароль</label>
                <input type="password" name="password" class="form-control" required autocomplete="current-password" placeholder="••••••••">
            </div>
            <button type="submit" class="btn btn-login btn-success mt-2">
                <i class="bi bi-box-arrow-in-right"></i> Увійти
            </button>
        </form>
    </div>
</body>
</html>
