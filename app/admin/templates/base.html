<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}BLACK ROOM Admin{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0a0e14;
            --bg-secondary: #111820;
            --bg-card: #141b24;
            --bg-card-hover: #1a2332;
            --border-color: #1e2a3a;
            --border-accent: #2d3d52;
            --text-primary: #e6edf3;
            --text-secondary: #8b949e;
            --text-muted: #484f58;
            --accent-blue: #58a6ff;
            --accent-green: #3fb950;
            --accent-red: #f85149;
            --accent-yellow: #d29922;
            --accent-purple: #a371f7;
            --accent-cyan: #39d2c0;
            --glow-blue: rgba(88,166,255,0.12);
            --glow-green: rgba(63,185,80,0.12);
            --glow-red: rgba(248,81,73,0.12);
        }
        * { scrollbar-width: thin; scrollbar-color: #1e2a3a transparent; }
        body { background: var(--bg-primary); color: var(--text-primary); font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }

        /* ── Sidebar ── */
        .sidebar {
            width: 250px; min-height: 100vh; background: var(--bg-secondary);
            border-right: 1px solid var(--border-color); position: fixed;
            top: 0; left: 0; z-index: 100; display: flex; flex-direction: column;
        }
        .sidebar .nav-link {
            color: var(--text-secondary); padding: 0.55rem 1rem; border-radius: 8px;
            margin: 2px 10px; font-size: 0.85rem; transition: all 0.2s;
            display: flex; align-items: center; gap: 10px;
        }
        .sidebar .nav-link:hover { color: var(--text-primary); background: var(--bg-card); }
        .sidebar .nav-link.active {
            color: var(--accent-blue); background: var(--glow-blue);
            border-left: 3px solid var(--accent-blue); margin-left: 7px;
        }
        .sidebar .nav-link i { width: 20px; text-align: center; font-size: 1rem; }
        .main-content { margin-left: 250px; padding: 1.5rem 2rem; min-height: 100vh; }

        /* ── Logo ── */
        .logo {
            padding: 1rem 1rem 1.2rem; font-size: 1.15rem; font-weight: 800;
            color: #f0f6fc; letter-spacing: -0.5px;
            border-bottom: 1px solid var(--border-color); margin-bottom: 0.5rem;
        }
        .logo span { color: var(--accent-blue); }

        /* ── Cards ── */
        .card {
            background: var(--bg-card); border: 1px solid var(--border-color);
            border-radius: 12px; transition: all 0.2s;
        }
        .card:hover { border-color: var(--border-accent); }
        .card-header {
            background: transparent; border-bottom: 1px solid var(--border-color);
            font-weight: 600; font-size: 0.85rem; color: var(--text-secondary);
            padding: 0.8rem 1rem; letter-spacing: 0.3px;
        }

        /* ── Stat cards ── */
        .stat-card {
            background: var(--bg-card); border: 1px solid var(--border-color);
            border-radius: 12px; padding: 1.1rem 1.2rem; position: relative; overflow: hidden;
            transition: all 0.25s;
        }
        .stat-card:hover { border-color: var(--border-accent); transform: translateY(-1px); }
        .stat-card .stat-icon {
            position: absolute; top: 12px; right: 14px; font-size: 1.4rem;
            opacity: 0.15; color: var(--text-secondary);
        }
        .stat-card .stat-value { font-size: 1.7rem; font-weight: 800; letter-spacing: -0.5px; line-height: 1.2; }
        .stat-card .stat-label {
            font-size: 0.7rem; color: var(--text-secondary); text-transform: uppercase;
            letter-spacing: 0.7px; font-weight: 600; margin-bottom: 4px;
        }
        .stat-card .stat-sub { font-size: 0.75rem; color: var(--text-muted); margin-top: 4px; }
        .stat-card.glow-blue { border-left: 3px solid var(--accent-blue); }
        .stat-card.glow-green { border-left: 3px solid var(--accent-green); }
        .stat-card.glow-red { border-left: 3px solid var(--accent-red); }
        .stat-card.glow-yellow { border-left: 3px solid var(--accent-yellow); }
        .stat-card.glow-purple { border-left: 3px solid var(--accent-purple); }
        .stat-card.glow-cyan { border-left: 3px solid var(--accent-cyan); }

        /* ── Tables ── */
        .table { --bs-table-bg: transparent; --bs-table-border-color: var(--border-color); font-size: 0.85rem; }
        .table thead th {
            background: rgba(255,255,255,0.02); font-weight: 600; text-transform: uppercase;
            font-size: 0.7rem; letter-spacing: 0.6px; color: var(--text-muted);
            border-bottom: 1px solid var(--border-color); padding: 0.6rem 0.75rem;
        }
        .table td { padding: 0.55rem 0.75rem; vertical-align: middle; }
        .table tbody tr { transition: background 0.15s; }
        .table tbody tr:hover { background: rgba(255,255,255,0.02); }

        /* ── Badges ── */
        .badge { font-weight: 600; font-size: 0.7rem; letter-spacing: 0.3px; padding: 0.3em 0.65em; border-radius: 6px; }
        .badge-long { background: var(--accent-green); color: #fff; }
        .badge-short { background: var(--accent-red); color: #fff; }
        .badge-active { background: var(--accent-blue); }
        .badge-stopped { background: var(--accent-red); }
        .badge-tp { background: var(--accent-green); }
        .badge-expired { background: var(--text-muted); }

        /* ── Colors ── */
        .text-green { color: var(--accent-green) !important; }
        .text-red { color: var(--accent-red) !important; }
        .text-yellow { color: var(--accent-yellow) !important; }
        .text-blue { color: var(--accent-blue) !important; }
        .text-purple { color: var(--accent-purple) !important; }
        .text-cyan { color: var(--accent-cyan) !important; }

        /* ── Status dots ── */
        .status-dot {
            width: 8px; height: 8px; border-radius: 50%; display: inline-block;
        }
        .status-dot.online { background: var(--accent-green); box-shadow: 0 0 6px var(--accent-green); animation: pulse 2s infinite; }
        .status-dot.offline { background: var(--accent-red); }
        .status-dot.warning { background: var(--accent-yellow); box-shadow: 0 0 6px var(--accent-yellow); }

        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

        /* ── Forms ── */
        .form-control, .form-select {
            background: var(--bg-primary); border-color: var(--border-color);
            color: var(--text-primary); border-radius: 8px; font-size: 0.85rem;
        }
        .form-control:focus, .form-select:focus {
            background: var(--bg-primary); border-color: var(--accent-blue);
            color: var(--text-primary); box-shadow: 0 0 0 0.2rem var(--glow-blue);
        }

        /* ── Buttons ── */
        .btn-primary { background: #238636; border-color: #238636; border-radius: 8px; font-weight: 600; }
        .btn-primary:hover { background: #2ea043; border-color: #2ea043; }
        .btn-outline-secondary { border-color: var(--border-color); color: var(--text-secondary); border-radius: 8px; }
        .btn-outline-secondary:hover { background: var(--bg-card); color: var(--text-primary); }

        /* ── Page header ── */
        .page-header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 1.5rem; padding-bottom: 0.75rem;
            border-bottom: 1px solid var(--border-color);
        }
        .page-header h1 { font-size: 1.3rem; font-weight: 700; margin: 0; }
        .page-header .page-meta { font-size: 0.75rem; color: var(--text-muted); }

        /* ── Breadcrumb ── */
        .breadcrumb { --bs-breadcrumb-divider: '›'; margin-bottom: 1.5rem; }
        .breadcrumb-item a { color: var(--accent-blue); text-decoration: none; }

        /* ── Sidebar footer ── */
        .sidebar-footer {
            margin-top: auto; padding: 0.8rem 1rem; border-top: 1px solid var(--border-color);
            font-size: 0.78rem; color: var(--text-muted);
        }

        /* ── Pagination ── */
        .page-link { background: var(--bg-card); border-color: var(--border-color); color: var(--text-secondary); font-size: 0.8rem; }
        .page-link:hover { background: var(--bg-card-hover); color: var(--text-primary); }
        .page-item.active .page-link { background: var(--accent-blue); border-color: var(--accent-blue); }

        /* ── Responsive ── */
        @media (max-width: 768px) {
            .sidebar { width: 100%; min-height: auto; position: relative; flex-direction: row; overflow-x: auto; }
            .sidebar .nav { flex-direction: row !important; }
            .sidebar .logo { display: none; }
            .sidebar-footer { display: none; }
            .main-content { margin-left: 0; padding: 1rem; }
        }

        /* ── Misc ── */
        code { color: var(--accent-purple); font-size: 0.8rem; }
        .dropdown-menu-dark { background: var(--bg-secondary); border-color: var(--border-color); }
        .alert-danger { background: rgba(248,81,73,0.1); border-color: var(--accent-red); color: var(--accent-red); }
    </style>
    {% block extra_head %}{% endblock %}
</head>
<body>
    <nav class="sidebar">
        <div class="logo">⚫ BLACK <span>ROOM</span></div>
        <ul class="nav flex-column flex-grow-1 py-2">
            <li class="nav-item">
                <a class="nav-link {% if active_page == 'dashboard' %}active{% endif %}" href="/admin/">
                    <i class="bi bi-grid-1x2-fill"></i> Dashboard
                </a>
            </li>
            <li class="nav-item">
                <a class="nav-link {% if active_page == 'signals' %}active{% endif %}" href="/admin/signals">
                    <i class="bi bi-broadcast-pin"></i> Signals
                </a>
            </li>
            <li class="nav-item">
                <a class="nav-link {% if active_page == 'users' %}active{% endif %}" href="/admin/users">
                    <i class="bi bi-people-fill"></i> Users
                </a>
            </li>
            <li class="nav-item">
                <a class="nav-link {% if active_page == 'learning' %}active{% endif %}" href="/admin/learning">
                    <i class="bi bi-cpu-fill"></i> AI Learning
                </a>
            </li>
            <li class="nav-item">
                <a class="nav-link {% if active_page == 'stats' %}active{% endif %}" href="/admin/stats">
                    <i class="bi bi-graph-up-arrow"></i> Statistics
                </a>
            </li>
            <li class="nav-item">
                <a class="nav-link {% if active_page == 'alerts' %}active{% endif %}" href="/admin/alerts">
                    <i class="bi bi-bell-fill"></i> Alerts
                </a>
            </li>
            <li class="nav-item">
                <a class="nav-link {% if active_page == 'system' %}active{% endif %}" href="/admin/system">
                    <i class="bi bi-gear-fill"></i> System
                </a>
            </li>
            <li class="nav-item">
                <a class="nav-link {% if active_page == 'signal_logs' %}active{% endif %}" href="/admin/signal-logs">
                    <i class="bi bi-journal-text"></i> Signal Logs
                </a>
            </li>
            <li class="nav-item">
                <a class="nav-link {% if active_page == 'coins' %}active{% endif %}" href="/admin/coins">
                    <i class="bi bi-coin"></i> Coins
                </a>
            </li>
            <li class="nav-item">
                <a class="nav-link {% if active_page == 'wallets' %}active{% endif %}" href="/admin/wallets">
                    <i class="bi bi-wallet2"></i> Wallets
                </a>
            </li>
        </ul>
        <div class="sidebar-footer">
            <div class="d-flex justify-content-between align-items-center">
                <span><i class="bi bi-person-circle"></i> {{ admin_user }}</span>
                <a href="/admin/logout" class="text-danger text-decoration-none" title="Logout"><i class="bi bi-box-arrow-right"></i></a>
            </div>
        </div>
    </nav>

    <div class="main-content">
        {% block content %}{% endblock %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    {% block extra_scripts %}{% endblock %}
</body>
</html>
